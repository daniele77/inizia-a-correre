name: Publish PDF to Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - '**/*.tex'
      - 'images/**'
      - 'latexmkrc'
      - '.github/workflows/pages-pdf.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-extra

      - name: Build PDF
        run: latexmk -pdf book.tex

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp build/book.pdf site/book.pdf
          cat > site/index.html << 'EOF'
          <!doctype html>
          <html lang="it">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>Opuscolo - Iniziare a correre</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; line-height: 1.5; }
              a { font-size: 1.1rem; }
            </style>
          </head>
          <body>
            <h1>Opuscolo: Iniziare a correre</h1>
            <p><a href="book.pdf">Apri / scarica il PDF</a></p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
